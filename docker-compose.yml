services:
  mongo:
    image: mongo:7
    container_name: pcm-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"db.adminCommand('ping').ok\" mongodb://localhost:27017/admin | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - pcm_net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: pcm-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: "${CLICKHOUSE_DB:-promo_code_manager}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-pcm_user}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-pcm_password}"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_TCP_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q 'Ok.'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - pcm_net

  clickhouse-init:
    image: clickhouse/clickhouse-server:24.8
    container_name: pcm-clickhouse-init
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./infra/clickhouse/init/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    command:
      - /bin/sh
      - -c
      - |
        clickhouse-client --host clickhouse --user "${CLICKHOUSE_USER:-pcm_user}" --password "${CLICKHOUSE_PASSWORD:-pcm_password}" --query "SELECT 1";
        clickhouse-client --host clickhouse --user "${CLICKHOUSE_USER:-pcm_user}" --password "${CLICKHOUSE_PASSWORD:-pcm_password}" --multiquery < /docker-entrypoint-initdb.d/001_schema.sql;
    environment:
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-pcm_user}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-pcm_password}"
    restart: "no"
    networks:
      - pcm_net

  redis:
    image: redis:7-alpine
    container_name: pcm-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - pcm_net

volumes:
  mongo_data:
  clickhouse_data:
  clickhouse_logs:
  redis_data:

networks:
  pcm_net:
    name: promo_code_manager_net
